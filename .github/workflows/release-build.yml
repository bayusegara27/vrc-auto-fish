name: Release CUDA Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: GitHub release tag to create or update
        required: true
        type: string
      asset_name:
        description: Release asset filename
        required: false
        default: AutoFish.7z
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Upgrade pip
        shell: pwsh
        run: python -m pip install --upgrade pip

      - name: Install PyTorch with fallback
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $channels = @(
            @{ Label = "cu128"; Url = "https://download.pytorch.org/whl/cu128" },
            @{ Label = "cu118"; Url = "https://download.pytorch.org/whl/cu118" },
            @{ Label = "cpu"; Url = "https://download.pytorch.org/whl/cpu" }
          )
          $installed = $false
          foreach ($channel in $channels) {
            Write-Host "Trying PyTorch channel: $($channel.Label)"
            try {
              python -m pip install torch torchvision --index-url $channel.Url
              if ($LASTEXITCODE -eq 0) {
                "PYTORCH_CHANNEL=$($channel.Label)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                $installed = $true
                break
              }
            } catch {
              Write-Warning "PyTorch install failed on channel $($channel.Label): $_"
            }
          }
          if (-not $installed) {
            throw "Failed to install PyTorch from cu128, cu118, and cpu channels."
          }

      - name: Install project requirements
        shell: pwsh
        run: pip install -r requirements.txt

      - name: Install build tools
        shell: pwsh
        run: pip install pyinstaller

      - name: Print build environment diagnostics
        shell: pwsh
        run: |
          Write-Host "Selected PyTorch channel: $env:PYTORCH_CHANNEL"
          $code = @'
          import cv2, ncnn, pnnx, torch, ultralytics
          print("torch=%s cuda=%s" % (torch.__version__, torch.cuda.is_available()))
          print("cv2=%s" % cv2.__version__)
          print("ultralytics=%s" % ultralytics.__version__)
          print("ncnn=%s pnnx=%s" % (getattr(ncnn, "__version__", "ok"), getattr(pnnx, "__version__", "ok")))
          '@
          $code | python -

      - name: Ensure 7-Zip is available
        shell: pwsh
        run: |
          if (-not (Get-Command 7z -ErrorAction SilentlyContinue)) {
            choco install 7zip -y
          }

      - name: Build CUDA package
        shell: pwsh
        run: python -m PyInstaller --noconfirm "VRC auto fish-CUDA.spec"

      - name: Validate build output
        shell: pwsh
        run: |
          $outputDir = "dist/VRC auto fish-CUDA"
          $exePath = Join-Path $outputDir "VRC auto fish-CUDA.exe"
          if (-not (Test-Path $outputDir)) {
            throw "Build output folder not found: $outputDir"
          }
          if (-not (Test-Path $exePath)) {
            throw "Built executable not found: $exePath"
          }
          Write-Host "Build output folder: $outputDir"
          Write-Host "Built executable: $exePath"
          Get-ChildItem $outputDir | Select-Object Name, Length

      - name: Archive build output as 7z
        shell: pwsh
        run: |
          $assetName = "${{ github.event.inputs.asset_name }}"
          if ([string]::IsNullOrWhiteSpace($assetName)) {
            $assetName = "AutoFish.7z"
          }
          $outputDir = "dist/VRC auto fish-CUDA"
          if (-not (Test-Path $outputDir)) {
            throw "Build output folder not found: $outputDir"
          }
          if (Test-Path $assetName) {
            Remove-Item $assetName -Force
          }
          7z a -t7z $assetName ".\\$outputDir\\*"

      - name: Create release if missing
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = "${{ github.event.inputs.tag_name }}"
          gh release view $tagName *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tagName --title $tagName --notes ""
          }

      - name: Upload 7z asset to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = "${{ github.event.inputs.tag_name }}"
          $assetName = "${{ github.event.inputs.asset_name }}"
          if ([string]::IsNullOrWhiteSpace($assetName)) {
            $assetName = "AutoFish.7z"
          }
          gh release upload $tagName $assetName --clobber
