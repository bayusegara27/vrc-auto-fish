name: Windows Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Upgrade pip
        shell: pwsh
        run: python -m pip install --upgrade pip

      - name: Install CPU PyTorch
        shell: pwsh
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install project requirements
        shell: pwsh
        run: pip install -r requirements.txt

      - name: Install ruff
        shell: pwsh
        run: pip install ruff

      - name: Import dependency sanity check
        shell: pwsh
        run: python -c "import cv2, keyboard, ncnn, torch, ultralytics"

      - name: Ruff syntax guardrails
        shell: pwsh
        run: ruff check . --config ruff.toml

      - name: Run stable unit tests
        shell: pwsh
        run: >
          python -m unittest
          tests.test_i18n
          tests.test_overlay_text
          tests.test_pd_controller
          tests.test_settings_store
          tests.test_console_logging
          tests.test_runtime_controller
          tests.test_yolo_detector
          tests.test_minigame_detection
          tests.test_minigame_session
          tests.test_labeling_common
          tests.test_trainer_common
          -v
